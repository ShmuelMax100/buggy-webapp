# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
name: 'Build and deploy Node.js app to Azure Web App: buggy-webapp-demo'

on:
  push:
    branches:
    - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: npm install
      run: npm install

    - name: Zip artifact
      run: zip -r release.zip . --exclude "*.git*"

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'buggy-webapp-demo'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_7b5c68a5c9264f2d86cdabc79047ef0f }}
        package: release.zip
